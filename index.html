<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Database</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f4; min-height: 100vh; }
.app { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 20px; font-weight: 600; color: #0e0e0e; }
.sub { font-size: 13px; color: #777; margin-top: 2px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.icon { width: 38px; height: 38px; background: #0d9488; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
.tab { padding: 8px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: #0d9488; font-weight: 600; border-bottom-color: #0d9488; }
.card { background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 20px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.row1 { margin-bottom: 12px; }
.lbl { font-size: 12px; color: #888; margin-bottom: 4px; }
input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; color: #0e0e0e; background: #fff; }
input:focus, textarea:focus { outline: none; border-color: #0d9488; }
textarea { min-height: 60px; resize: vertical; }
.hint { font-size: 11px; color: #aaa; margin-top: 3px; }
.btns { display: flex; gap: 8px; margin-top: 8px; }
button { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; background: #fff; font-family: inherit; }
button:hover { background: #f5f5f5; }
.btn-primary { background: #0d9488; color: #fff; border-color: #0d9488; }
.btn-primary:hover { background: #0b8276; }
.btn-danger { color: #c0392b; border-color: #e8b4b0; }
.btn-danger:hover { background: #fdf0ef; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.msg { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin-top: 10px; display: none; }
.msg.ok { background: #e6f4f1; color: #0b6e5c; display: block; }
.msg.err { background: #fdf0ef; color: #c0392b; display: block; }
.srow { display: flex; gap: 8px; margin-bottom: 16px; }
.srow input { flex: 1; }
.pcard { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
.pcard:hover { border-color: #0d9488; }
.pname { font-weight: 600; font-size: 15px; }
.pbadge { display: inline-block; background: #e0f2ef; color: #0b6e5c; font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 600; margin-left: 6px; }
.pmeta { font-size: 13px; color: #888; margin-top: 3px; }
.pnotes { font-size: 13px; color: #666; margin-top: 5px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: #d1ece8; color: #0b6e5c; font-weight: 600; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.thumb { width: 68px; height: 52px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; flex-shrink: 0; }
.thumb:hover { border-color: #0d9488; }
.noimg { width: 68px; height: 52px; border-radius: 6px; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.empty { text-align: center; padding: 32px; color: #aaa; font-size: 14px; }
.loading { text-align: center; padding: 20px; color: #aaa; font-size: 14px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; align-items: center; justify-content: center; padding: 16px; }
.overlay.show { display: flex; }
.popup { background: #fff; border-radius: 10px; padding: 20px; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; }
.popup img { width: 100%; border-radius: 8px; margin-bottom: 12px; }
.popup-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.popup-title { font-weight: 600; font-size: 15px; }
.dinfo { font-size: 13px; color: #555; line-height: 1.9; }
@media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Patient database</h1>
      <div class="sub" id="count">Loading...</div>
    </div>
    <div class="icon">
      <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('search')">Search / view</button>
    <button class="tab" onclick="showTab('add')">Add patient</button>
  </div>
  <div id="pane-search">
    <div class="srow">
      <input type="text" id="q" placeholder="Search by file number or name..." oninput="doSearch()">
      <button onclick="load()">Refresh</button>
    </div>
    <div id="loader" class="loading">Fetching patients...</div>
    <div id="list"></div>
  </div>
  <div id="pane-add" style="display:none">
    <div class="card">
      <div class="row2">
        <div><div class="lbl">File number *</div><input type="text" id="fn" placeholder="e.g. 00123456"></div>
        <div><div class="lbl">Full name *</div><input type="text" id="nm" placeholder="Patient full name"></div>
      </div>
      <div class="row2">
        <div><div class="lbl">Date of birth</div><input type="date" id="db"></div>
        <div><div class="lbl">Procedure type</div><input type="text" id="pt" placeholder="e.g. Genicular nerve RFA"></div>
      </div>
      <div class="row1">
        <div class="lbl">Procedure image URL</div>
        <input type="text" id="iu" placeholder="Paste Google Drive share link">
        <div class="hint">Drive: right-click image > Share > Anyone with link > copy URL</div>
      </div>
      <div class="row1">
        <div class="lbl">Notes / follow-up</div>
        <textarea id="nt" placeholder="Clinical notes, follow-up plan..."></textarea>
      </div>
      <div class="btns">
        <button class="btn-primary" onclick="addPt()">Save patient</button>
        <button onclick="clearForm()">Clear</button>
      </div>
      <div class="msg" id="amsg"></div>
    </div>
  </div>
</div>
<div class="overlay" id="img-overlay">
  <div class="popup">
    <div class="popup-hdr">
      <div class="popup-title" id="pop-title"></div>
      <button class="btn-sm" onclick="closeOv('img-overlay')">Close</button>
    </div>
    <img id="pop-img" src="" alt="Procedure image">
    <div class="dinfo" id="pop-info"></div>
  </div>
</div>
<div class="overlay" id="del-overlay">
  <div class="popup" style="max-width:380px">
    <div class="popup-hdr"><div class="popup-title">Delete patient?</div></div>
    <div style="font-size:14px;color:#666;margin-bottom:16px" id="del-msg"></div>
    <div class="btns">
      <button class="btn-danger" onclick="doDel()">Yes, delete</button>
      <button onclick="closeOv('del-overlay')">Cancel</button>
    </div>
  </div>
</div>
<script>
var API = "https://script.google.com/macros/s/AKfycbzTNW-NHo-kf6dkuL4FoexusJpzN46tx5BqWd6l3SPtKBi18bUvSCPIqqhJUEVuQ1qvsA/exec";
var all = [];
var delFile = null;
function showTab(t) {
  document.getElementById("pane-search").style.display = t === "search" ? "block" : "none";
  document.getElementById("pane-add").style.display = t === "add" ? "block" : "none";
  var tabs = document.querySelectorAll(".tab");
  tabs[0].className = "tab" + (t === "search" ? " on" : "");
  tabs[1].className = "tab" + (t === "add" ? " on" : "");
}
function toThumb(url) {
  if (!url) return null;
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w800";
  return url;
}
function load() {
  document.getElementById("loader").style.display = "block";
  document.getElementById("list").innerHTML = "";
  fetch(API + "?action=getAll")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      all = d.data || [];
      document.getElementById("count").textContent = all.length + " patient" + (all.length !== 1 ? "s" : "") + " on record";
      render(all);
      document.getElementById("loader").style.display = "none";
    })
    .catch(function() {
      document.getElementById("list").innerHTML = '<div class="empty">Could not reach the database.</div>';
      document.getElementById("loader").style.display = "none";
    });
}
function render(list) {
  var el = document.getElementById("list");
  if (!list.length) { el.innerHTML = '<div class="empty">No patients found.</div>'; return; }
  var html = "";
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var img = toThumb(p.ImageURL);
    var nm = String(p.Name || "?");
    var ini = nm.split(" ").map(function(w) { return w[0]; }).slice(0, 2).join("").toUpperCase();
    html += '<div class="pcard"><div style="display:flex;gap:12px;align-items:flex-start">';
    html += '<div class="avatar">' + ini + "</div>";
    html += '<div style="flex:1;min-width:0">';
    html += '<span class="pname">' + String(p.Name || "-") + "</span>";
    html += '<span class="pbadge"># ' + String(p.FileNumber || "-") + "</span>";
    html += '<div class="pmeta">' + String(p.ProcedureType || "No procedure recorded") + (p.DOB ? " &middot; DOB: " + p.DOB : "") + "</div>";
    if (p.Notes) html += '<div class="pnotes">' + String(p.Notes) + "</div>";
    html += "</div>";
    html += '<div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0">';
    if (img) {
      html += '<img class="thumb" src="' + img + '" data-img="' + img + '" data-name="' + String(p.Name || "") + '" data-proc="' + String(p.ProcedureType || "") + '" data-dob="' + String(p.DOB || "") + '" data-notes="' + String(p.Notes || "") + '" onerror="this.style.display=\'none\'">';
    } else {
      html += '<div class="noimg"></div>';
    }
    html += '<button class="btn-sm btn-danger" data-file="' + String(p.FileNumber || "") + '" data-name="' + String(p.Name || "") + '">Delete</button>';
    html += "</div></div></div>";
  }
  el.innerHTML = html;
  el.querySelectorAll(".thumb").forEach(function(img) {
    img.addEventListener("click", function() {
      openImg(this.dataset.img, this.dataset.name, this.dataset.proc, this.dataset.dob, this.dataset.notes);
    });
  });
  el.querySelectorAll(".btn-danger").forEach(function(btn) {
    btn.addEventListener("click", function() {
      promptDel(this.dataset.file, this.dataset.name);
    });
  });
}
function doSearch() {
  var q = document.getElementById("q").value.toLowerCase().trim();
  if (!q) { render(all); return; }
  render(all.filter(function(p) {
    var fn = String(p.FileNumber || "").toLowerCase();
    var nm = String(p.Name || "").toLowerCase();
    return fn.indexOf(q) > -1 || nm.indexOf(q) > -1;
  }));
}
function openImg(img, name, proc, dob, notes) {
  document.getElementById("pop-img").src = img;
  document.getElementById("pop-title").textContent = name || "Procedure image";
  var info = [];
  if (proc) info.push("<b>Procedure:</b> " + proc);
  if (dob) info.push("<b>DOB:</b> " + dob);
  if (notes) info.push("<b>Notes:</b> " + notes);
  document.getElementById("pop-info").innerHTML = info.join("<br>");
  document.getElementById("img-overlay").className = "overlay show";
}
function closeOv(id) { document.getElementById(id).className = "overlay"; }
function promptDel(file, name) {
  delFile = file;
  document.getElementById("del-msg").textContent = "This will permanently remove " + name + " (# " + file + ") from the database.";
  document.getElementById("del-overlay").className = "overlay show";
}
function doDel() {
  closeOv("del-overlay");
  fetch(API + "?action=delete&fileNumber=" + encodeURIComponent(delFile))
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.success) load(); })
    .catch(function() {});
}
function addPt() {
  var file = document.getElementById("fn").value.trim();
  var name = document.getElementById("nm").value.trim();
  if (!file || !name) { setMsg("File number and name are required.", false); return; }
  var dup = all.filter(function(p) { return String(p.FileNumber).toLowerCase() === file.toLowerCase(); });
  if (dup.length) { setMsg("File # " + file + " already exists for " + dup[0].Name + ".", false); return; }
  var data = { FileNumber: file, Name: name, DOB: document.getElementById("db").value, ProcedureType: document.getElementById("pt").value.trim(), ImageURL: document.getElementById("iu").value.trim(), Notes: document.getElementById("nt").value.trim() };
  fetch(API, { method: "POST", body: JSON.stringify(data) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) { setMsg(name + " added successfully.", true); clearForm(); load(); }
      else setMsg("Save failed. Try again.", false);
    })
    .catch(function() { setMsg("Network error. Check deployment settings.", false); });
}
function clearForm() { ["fn","nm","db","pt","iu","nt"].forEach(function(id) { document.getElementById(id).value = ""; }); }
function setMsg(msg, ok) {
  var el = document.getElementById("amsg");
  el.textContent = msg;
  el.className = "msg " + (ok ? "ok" : "err");
  setTimeout(function() { el.className = "msg"; el.textContent = ""; }, 4000);
}
load();
</script>
</body>
</html>
